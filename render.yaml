services:
  # Web Service - Main Application
  - type: web
    name: kimmy-earning-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python src/dashboard.py
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PORT
        value: 8080
      - key: FLASK_ENV
        value: production
      - key: HIGGSFIELD_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kimmy-db
          property: connectionString
    autoDeploy: true

databases:
  - name: kimmy-db
    plan: free
    databaseName: kimmy
    user: kimmy_user