services:
  - type: web
    name: kimmy-earning-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python src/dashboard.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
      - key: HIGGSFIELD_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kimmy-db
          property: connectionString
    autoDeploy: true

databases:
  - name: kimmy-db
    plan: free
    databaseName: kimmy
    user: kimmy_user